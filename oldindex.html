class Game{constructor(){this.cv=$('game');this.c=this.cv.getContext('2d');this.save=new Save;this.audio=new Audio(this.save);this.visorSys=new Visor(this);this.mode='boot';this.pointer={x:innerWidth/2,y:innerHeight/2,down:false};this.cover=true;this.coverPos=1;this.cleanPower=1;this.bind();this.resize();this.menu();requestAnimationFrame(t=>this.loop(t))}bind(){addEventListener('resize',()=>this.resize());addEventListener('blur',()=>this.pauseGame());document.addEventListener('visibilitychange',()=>{if(document.hidden)this.pauseGame()});document.addEventListener('contextmenu',e=>e.preventDefault());this.cv.addEventListener('pointerdown',e=>{this.audio.init();this.cv.setPointerCapture(e.pointerId);this.pointer.down=true;this.move(e);if(this.mode==='play'&&this.cover)this.lastClean={x:e.clientX,y:e.clientY};else if(this.save.d.settings.simple)this.fire()});this.cv.addEventListener('pointermove',e=>{this.move(e);if(this.mode==='play'&&this.pointer.down&&this.cover&&this.lastClean){this.visorSys.clean(e.clientX,e.clientY,this.lastClean.x,this.lastClean.y);this.lastClean={x:e.clientX,y:e.clientY}}});this.cv.addEventListener('pointerup',()=>{this.pointer.down=false;this.lastClean=null});addEventListener('keydown',e=>{if(this.mode!=='play')return;if(e.key===' ')this.cover=true;if(e.key==='r'||e.key==='R')this.reload();if(e.key==='e'||e.key==='E')this.ability();if(e.key==='a'||e.key==='ArrowLeft')this.switch(-1);if(e.key==='d'||e.key==='ArrowRight')this.switch(1);if(e.key==='Escape'||e.key==='p'||e.key==='P')this.pauseGame()});addEventListener('keyup',e=>{if(e.key===' ')this.cover=false});$('fire').onclick=()=>this.fire();$('cover').onpointerdown=()=>this.cover=true;$('cover').onpointerup=()=>this.cover=false;$('reload').onclick=()=>this.reload();$('ability').onclick=()=>this.ability();$('left').onclick=()=>this.switch(-1);$('right').onclick=()=>this.switch(1);$('pause').onclick=()=>this.pauseGame()}resize(){let d=Math.min(devicePixelRatio||1,2);this.w=innerWidth;this.h=innerHeight;this.cv.width=this.w*d;this.cv.height=this.h*d;this.c.setTransform(d,0,0,d,0,0)}move(e){this.pointer.x=e.clientX;this.pointer.y=e.clientY}screen(s){$('screen').classList.remove('hidden');$('screen').innerHTML=s;$('hud').classList.add('hidden')}toast(t){let e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1700)}menu(){this.mode='menu';this.audio.menu();this.screen(`<div class=title>PAINTBALL<br>PANIC</div><p>Single-player arcade paintball with a physical painted visor.</p><div class=row>${['Play','Campaign','Quick Match','Target Rush','Survival','Daily Operation','Equipment','How to Play','Achievements','High Scores','Settings'].map(x=>`<button class="btn ${x==='Play'?'pink':''}" data-m="${x}">${x}</button>`).join('')}</div>`);document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>this.route(b.dataset.m))}route(m){this.audio.init();if(m==='Play'||m==='Campaign')return this.missions();if(['Quick Match','Target Rush','Survival','Daily Operation'].includes(m))return this.start({mode:m,mission:DATA.missions[0],difficulty:'Pro',marker:'Scout',tool:'Microfiber Glove',ability:'Focus Time'});if(m==='Equipment')return this.equipment();if(m==='How to Play')return this.how();if(m==='Achievements')return this.achievements();if(m==='High Scores')return this.high();if(m==='Settings')return this.settings()}missions(){this.screen(`<div class=panel><h1>Campaign</h1><div class=grid>${DATA.missions.map(m=>`<div class=card><h3>${m.id}. ${m.name}</h3><p>${DATA.arenas[m.arena]} • ${m.type}</p><p>${m.brief}</p><button class="btn gold" data-id=${m.id}>Start</button></div>`).join('')}</div><p><button class=btn id=back>Back</button></p></div>`);$('back').onclick=()=>this.menu();document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>this.loadout(DATA.missions[b.dataset.id-1]))}loadout(m){let opt=a=>a.map(x=>`<option>${Array.isArray(x)?x[0]:x}</option>`).join('');this.screen(`<div class=panel><h1>Loadout: ${m.name}</h1><div class=grid><label>Difficulty<select id=df>${Object.keys(DATA.diff).map(d=>`<option ${d==='Pro'?'selected':''}>${d}</option>`)}</select></label><label>Marker<select id=mk>${opt(DATA.markers)}</select></label><label>Visor Tool<select id=tl>${opt(DATA.tools)}</select></label><label>Ability<select id=ab>${opt(DATA.abilities)}</select></label></div><p>${m.goal}. Up to three stars for completion, score, and accuracy.</p><button class="btn pink" id=start>Enter Arena</button> <button class=btn id=back>Back</button></div>`);$('start').onclick=()=>this.start({mode:'Campaign',mission:m,difficulty:$('df').value,marker:$('mk').value,tool:$('tl').value,ability:$('ab').value});$('back').onclick=()=>this.missions()}start(o){$('screen').classList.add('hidden');$('hud').classList.remove('hidden');this.mode='play';this.opt=o;this.audio.stop();this.diff=DATA.diff[o.difficulty]||DATA.diff.Pro;this.marker=DATA.markers.find(m=>m[0]===o.marker)||DATA.markers[0];this.cleanPower=o.tool==='Microfiber Glove'?1.45:1;this.time=(o.mission?.time||90)*this.diff.time;this.score=0;this.combo=0;this.mult=1;this.shots=0;this.hits=0;this.reloadT=0;this.maxAmmo=this.marker[2]+this.diff.ammo;this.ammo=this.maxAmmo;this.charge=0;this.protect=2;this.shield=0;this.stats={wipes:0,highVisor:0,trick:0};this.projectiles=[];this.enemyShots=[];this.arenaPaint=[];this.visorSys.splats=[];this.spawn()}spawn(){this.enemies=[];let n=this.opt.mission?.boss?1:6+Math.floor((this.opt.mission?.id||1)/3);for(let i=0;i<n;i++){let type=this.opt.mission?.boss?'Boss '+this.opt.mission.name:DATA.enemies[(i+(this.opt.mission?.id||0))%DATA.enemies.length];this.enemies.push(new Enemy(this,type,rnd(110,this.w-110),rnd(150,this.h*.58)))}}fire(){if(this.mode!=='play'||this.cover||this.reloadT>0||this.ammo<=0){if(this.ammo<=0)this.reload();return}this.ammo--;this.shots++;this.audio.sfx('fire');let sp=(1-this.marker[3])*18;this.projectiles.push({x:this.w/2,y:this.h*.78,tx:this.pointer.x+rnd(-sp,sp),ty:this.pointer.y+rnd(-sp,sp),t:0,r:this.marker[0]==='Splash Cannon'?27:12});if(this.ammo<=0)this.reload()}reload(){if(this.reloadT<=0&&this.ammo<this.maxAmmo){this.reloadT=(this.cover?1:1.8)/(this.marker[5]||1);this.audio.sfx('reload')}}ability(){if(this.charge<1)return;this.charge=0;this.audio.sfx('ok');let a=this.opt.ability;if(a==='Clean Sweep'){this.visorSys.splats=[];this.enemyShots=[]}else if(a==='Bubble Shield')this.shield=5;else if(a==='Rapid Reload'){this.ammo=this.maxAmmo;this.reloadT=0}else if(a==='Paint Wave')this.enemies.filter(e=>!e.tagged&&e.state==='expose').forEach(e=>e.hit());else this.protect=4}switch(d){this.coverPos=clamp(this.coverPos+d,0,2);this.protect=1.2;this.audio.sfx('ok')}pauseGame(){if(this.mode!=='play')return;this.mode='paused';this.screen(`<div class=panel><h1>Paused</h1><div class=row><button class="btn pink" id=res>Resume</button><button class=btn id=restart>Restart Mission</button><button class=btn id=how>How to Play</button><button class=btn id=menu>Return to Main Menu</button></div><p>Music <input id=mv type=range min=0 max=1 step=.01 value=${this.save.d.settings.music}> SFX <input id=sv type=range min=0 max=1 step=.01 value=${this.save.d.settings.sfx}></p></div>`);$('res').onclick=()=>{this.mode='play';this.protect=2;$('screen').classList.add('hidden');$('hud').classList.remove('hidden')};$('restart').onclick=()=>this.start(this.opt);$('how').onclick=()=>this.how(true);$('menu').onclick=()=>{if(confirm('Leave the arena and lose current mission progress?'))this.menu()};$('mv').oninput=e=>{this.save.d.settings.music=+e.target.value;this.save.save()};$('sv').oninput=e=>{this.save.d.settings.sfx=+e.target.value;this.save.save()}}tag(e){this.hits++;this.combo++;this.mult=1+Math.floor(this.combo/4)*.5;this.score+=Math.floor(100*this.mult*this.diff.score);this.charge=clamp(this.charge+.14,0,1);this.audio.sfx('hit');this.unlock(this.hits===1?'First Tag':this.combo>=12?'Splatter Master':this.combo>=8?'Color Storm':this.combo>=4?'Hot Streak':'Clean Shot')}breakCombo(){this.combo=0;this.mult=1;this.toast('Decoy! Combo broken')}unlock(a){if(!a||this.save.d.ach[a])return;this.save.d.ach[a]=1;this.save.save();this.toast('Achievement: '+a)}end(win){this.mode='results';let acc=this.shots?Math.round(this.hits/this.shots*100):100,stars=win?1+(this.score>800?1:0)+(acc>70?1:0):0;if(this.opt.mode==='Campaign'){this.save.d.stars[this.opt.mission.id]=Math.max(this.save.d.stars[this.opt.mission.id]||0,stars);if(this.opt.mission.id===15&&win)this.save.d.panic=true}let key=this.opt.mode+' '+(this.opt.difficulty||'Pro');this.save.d.high[key]=Math.max(this.save.d.high[key]||0,this.score);this.save.save();this.screen(`<div class=panel><h1>${win?'Mission Complete!':'Tagged Out!'}</h1><h2>${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</h2><div class=grid>${[['Final score',this.score],['Accuracy',acc+'%'],['Opponents tagged',this.hits],['Shots fired',this.shots],['Longest combo',this.combo],['Highest multiplier','x'+this.mult],['Highest visor',Math.round(this.stats.highVisor)+'%'],['Wipes',this.stats.wipes]].map(x=>`<div class=card>${x[0]}<br><b>${x[1]}</b></div>`).join('')}</div><p class=row><button class="btn pink" id=retry>Retry</button><button class=btn id=next>Next Mission</button><button class=btn id=equip>Equipment</button><button class=btn id=menu>Main Menu</button></p></div>`);$('retry').onclick=()=>this.start(this.opt);$('next').onclick=()=>this.loadout(DATA.missions[(this.opt.mission?.id||1)%15]);$('equip').onclick=()=>this.equipment();$('menu').onclick=()=>this.menu()}equipment(){this.screen(`<div class=panel><h1>Equipment</h1><h2>Markers</h2><div class=grid>${DATA.markers.map(m=>`<div class=card><h3>${m[0]}</h3><p>${m[1]}</p><p>Hopper ${m[2]} • Accuracy ${Math.round(m[3]*100)} • Velocity ${m[4]}</p></div>`).join('')}</div><h2>Visor Tools</h2><p>${DATA.tools.join(' • ')}</p><h2>Special Abilities</h2><p>${DATA.abilities.join(' • ')}</p><h2>Survival Upgrades</h2><p>${DATA.survival.join(' • ')}</p><button class=btn id=back>Back</button></div>`);$('back').onclick=()=>this.menu()}how(paused=false){this.screen(`<div class=panel><h1>How to Play</h1><div class=grid>${['Mobile controls','Desktop controls','Aiming and shooting','Cover switching','Reloading','Visor paint','Manual visor cleaning','Opponent guide','Mission objectives','Equipment','Difficulties','Scoring and combos'].map(x=>`<div class=card><b>${x}</b><p>Use responsive controls, watch attack warnings, and balance firing with safe cover time.</p></div>`).join('')}</div><p>Drag/touch or use mouse to aim. FIRE tags opponents. Hold COVER or Space to duck. R reloads. A/D switches cover. E activates the special. While behind cover, drag across visor paint to smear and wipe it away.</p><button class="btn pink" id=tut>Replay Tutorial</button> <button class=btn id=back>Back</button></div>`);$('tut').onclick=()=>{this.start({mode:'Tutorial',mission:DATA.missions[0],difficulty:'Rookie',marker:'Scout',tool:'Microfiber Glove',ability:'Clean Sweep'});this.toast('Tutorial: aim, fire, reload, cover, clean, switch, use ability.')};$('back').onclick=()=>paused?this.pauseGame():this.menu()}achievements(){this.screen(`<div class=panel><h1>Achievements</h1><div class=grid>${DATA.ach.map(a=>`<div class=card>${this.save.d.ach[a]?'✓':'□'} <b>${a}</b><p>${this.save.d.ach[a]?'Unlocked':'Locked'}</p></div>`).join('')}</div><button class=btn id=back>Back</button></div>`);$('back').onclick=()=>this.menu()}high(){this.screen(`<div class=panel><h1>High Scores</h1>${Object.entries(this.save.d.high).map(([k,v])=>`<p>${k}: <b>${v}</b></p>`).join('')||'<p>No scores yet.</p>'}<button class=btn id=back>Back</button></div>`);$('back').onclick=()=>this.menu()}settings(){let s=this.save.d.settings;this.screen(`<div class=panel><h1>Settings</h1><div class=grid>${['assist','simple','shake','reduced','large','contrast','colorblind','traj','haptic'].map(k=>`<label class=card><input type=checkbox id=${k} ${s[k]?'checked':''}> ${k}</label>`).join('')}<label class=card>Graphics <select id=graphics><option>High</option><option>Balanced</option><option>Battery Saver</option></select></label></div><p>Music <input id=mv type=range min=0 max=1 step=.01 value=${s.music}> SFX <input id=sv type=range min=0 max=1 step=.01 value=${s.sfx}></p><button class="btn gold" id=full>Fullscreen</button> <button class=btn id=reset>Reset Progress</button> <button class=btn id=back>Back</button></div>`);$('graphics').value=s.graphics;['assist','simple','shake','reduced','large','contrast','colorblind','traj','haptic'].forEach(k=>$(k).onchange=e=>{s[k]=e.target.checked;this.save.save()});$('graphics').onchange=e=>{s.graphics=e.target.value;this.save.save()};$('mv').oninput=e=>{s.music=+e.target.value;this.save.save()};$('sv').oninput=e=>{s.sfx=+e.target.value;this.save.save()};$('full').onclick=()=>document.documentElement.requestFullscreen?.();$('reset').onclick=()=>confirm('Reset all Paintball Panic progress?')&&this.save.reset();$('back').onclick=()=>this.menu()}update(dt){if(this.mode!=='play')return;this.time-=dt;this.protect=Math.max(0,this.protect-dt);this.shield=Math.max(0,this.shield-dt);if(this.reloadT>0){this.reloadT-=dt;if(this.reloadT<=0)this.ammo=this.maxAmmo}this.visorSys.update(dt);let cov=this.visorSys.coverage();this.stats.highVisor=Math.max(this.stats.highVisor,cov);if(cov>=99)return this.end(false);if(this.time<=0)return this.end(this.opt.mode==='Survival'||this.hits>0);for(const e of this.enemies)e.update(dt);for(const p of this.projectiles){p.t+=dt;p.x+=(p.tx-p.x)*dt*8;p.y+=(p.ty-p.y)*dt*8;for(const e of this.enemies){if(!e.tagged&&e.state==='expose'&&Math.hypot(p.x-e.x,p.y-e.y)<p.r+32+this.diff.assist){e.hit();p.dead=1;this.arenaPaint.push({x:p.x,y:p.y,r:p.r*1.4,c:'#ff3faf'});break}}if(p.t>1)p.dead=1}this.projectiles=this.projectiles.filter(p=>!p.dead);for(const s of this.enemyShots){s.t+=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.t>1){this.visorSys.add(clamp(s.x,60,this.w-60),clamp(s.y,80,this.h-80),s.type);s.dead=1;this.combo=0}}this.enemyShots=this.enemyShots.filter(s=>!s.dead);if(this.enemies.every(e=>e.tagged))this.opt.mode==='Survival'?this.spawn():this.end(true);if(this.cover&&this.save.d.settings.simple&&this.visorSys.splats[0])this.visorSys.splats[0].life-=dt*.08;this.hud()}hud(){$('score').textContent='Score '+this.score;$('obj').textContent=(this.opt.mission?.name||this.opt.mode)+' '+Math.ceil(this.time)+'s';$('ammo').textContent=(this.reloadT>0?'Reload ':'')+this.ammo+'/'+this.maxAmmo;$('visor').textContent='Visor '+Math.round(this.visorSys.coverage())+'%';$('combo').textContent=['Clean Shot','Hot Streak','Color Storm','Splatter Master','Paintball Panic!'][clamp(Math.floor(this.combo/4),0,4)]+' x'+this.mult;$('ability').style.setProperty('--q',this.charge*100+'%')}arena(c){let w=this.w,h=this.h,a=this.opt?.mission?.arena||0;c.fillStyle=['#79d66b','#142546','#238cc7'][a];c.fillRect(0,0,w,h);c.fillStyle=a===1?'#263d6e':a===2?'#9b6b35':'#7bd0ff';c.fillRect(0,0,w,h*.35);for(let i=0;i<12;i++){c.fillStyle=a===1?'#3affdd33':a===2?'#ffdc5444':'#ffffff70';c.beginPath();c.arc((i*157+Date.now()/80)%w,60+(i%4)*35,30,0,TAU);c.fill()}for(let i=0;i<8;i++){let x=(i+.5)*w/8;c.fillStyle=['#ff5ca8','#39d7ff','#ffdb4a'][i%3];c.beginPath();c.roundRect(x-45,h*.55+(i%2)*35,90,55,22);c.fill();c.strokeStyle='#fff5';c.stroke()}for(const p of this.arenaPaint.slice(-80)){c.fillStyle=p.c;c.beginPath();c.arc(p.x,p.y,p.r,0,TAU);c.fill()}let cx=[w*.16,w*.5,w*.84][this.coverPos];c.fillStyle='#05121eda';c.beginPath();c.roundRect(cx-w*.2,h*.78,w*.4,h*.25,28);c.fill();c.fillStyle='#ffffff22';c.fillRect(cx-w*.18,h*.8,w*.36,8)}draw(t){let c=this.c;c.clearRect(0,0,this.w,this.h);this.arena(c);if(this.mode==='menu'){c.fillStyle='#ff3faf88';c.beginPath();c.arc(this.w*.55,this.h*.35,80+Math.sin(t/300)*18,0,TAU);c.fill();this.visorSys.draw(c);return}if(['play','paused','results'].includes(this.mode)){for(const e of this.enemies||[])e.draw(c);for(const p of this.projectiles||[]){c.strokeStyle='#fff8';c.lineWidth=4;c.beginPath();c.moveTo(p.x,p.y);c.lineTo(p.x-(p.tx-p.x)*.12,p.y-(p.ty-p.y)*.12);c.stroke();c.fillStyle='#ff3faf';c.beginPath();c.arc(p.x,p.y,7,0,TAU);c.fill()}for(const s of this.enemyShots||[]){c.fillStyle='#ffd54a';c.beginPath();c.arc(s.x,s.y,8,0,TAU);c.fill()}this.visorSys.draw(c);let x=this.pointer.x,y=this.pointer.y;c.strokeStyle=this.cover?'#7ff':'#fff';c.lineWidth=3;c.beginPath();c.arc(x,y,18+Math.sin(t/90)*2,0,TAU);c.moveTo(x-28,y);c.lineTo(x-8,y);c.moveTo(x+8,y);c.lineTo(x+28,y);c.moveTo(x,y-28);c.lineTo(x,y-8);c.moveTo(x,y+8);c.lineTo(x,y+28);c.stroke();if(this.cover){c.fillStyle='#00182755';c.fillRect(0,0,this.w,this.h);c.fillStyle='#dff';c.font='900 22px sans-serif';c.textAlign='center';c.fillText('BEHIND COVER - swipe visor paint to clean',this.w/2,this.h*.72)}}}loop(t){let dt=Math.min(.033,((t-this.last)||16)/1000);this.last=t;this.update(dt);this.draw(t);requestAnimationFrame(x=>this.loop(x))}}
if(!CanvasRenderingContext2D.prototype.roundRect)CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this};new Game();})();
